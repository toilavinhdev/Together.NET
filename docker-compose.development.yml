version: '3.4'
name: together-development

services:
  dev-redis:
    container_name: dev-redis
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped
  
  dev-together-api:
    container_name: dev-together-api
    image: together.api
    build:
      context: .
      dockerfile: Together.API/Dockerfile
    ports:
        - "8010:8080"
    restart: unless-stopped
    depends_on: 
      - prod-redis
